database:
  # Accepted values: "h2" or "mariadb"
  type: "h2"
  h2:
    file: "players"
    options: "AUTO_SERVER=FALSE;MODE=MySQL"
  mariadb:
    host: "127.0.0.1"
    port: 3306
    database: "authsecurity"
    username: "auth"
    password: "change-me"
    parameters: "useSSL=false&autoReconnect=true&characterEncoding=utf8"
  pool:
    maximum-pool-size: 8
    minimum-idle: 2
    connection-timeout-millis: 5000

security:
  max-attempts: 5
  session-ttl-hours: 1
  login-timeout-minutes: 3
  password-min-length: 6
  password-max-length: 72
  # Maximum number of distinct accounts that may be connected concurrently from the same IP.
  accounts-per-ip-limit: 3

support:
  # Shown to the player when they press "Forgot Password"
  discord-url: "https://discord.gg/your-invite-here"

