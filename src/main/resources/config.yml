  forgot-password-discord-button: "<blue>Open Discord invite</blue>"
  forgot-password-back-button: "<gray>Back</gray>"

  change-password-title: "<gold>🔑 Change password</gold>"
  change-password-body: "<gray>Enter your current password followed by the new one.</gray>"
  change-password-old-label: "<white>Current password</white>"
  change-password-new-label: "<white>New password</white>"
  change-password-confirm-label: "<white>Confirm new password</white>"
  change-password-button: "<green>Save</green>"
  change-password-success: "<green>Your password has been updated.</green>"
  change-password-wrong-old: "<red>Your current password is incorrect.</red>"

  command-only-players: "<red>Only players can run this command.</red>"
  command-not-authenticated: "<red>You are not logged in.</red>"
  command-player-not-found: "<red>No account registered for '<player>'.</red>"
  command-unregister-success: "<green>Account '<player>' has been removed.</green>"
  command-changepassword-admin-success: "<green>Password for '<player>' has been updated.</green>"
  command-accountinfo-header: "<gold>Account info for <player></gold>"
  command-accountinfo-line: "<gray><key>:</gray> <white><value></white>"
  command-no-permission: "<red>You do not have permission to use this command.</red>"
  command-logout-success: "<green>'<player>' has been logged out.</green>"
  command-logout-not-online: "<yellow>'<player>' is not online. Trusted session cleared.</yellow>"
  command-logout-kick: "<yellow>You have been logged out by an administrator.</yellow>"

  command-reload-started: "<gray>Reloading AuthSecurity configuration…</gray>"
  command-reload-success: "<green>AuthSecurity configuration reloaded. Database settings require a server restart.</green>"
  command-reload-failed: "<red>Reload failed — see server log.</red>"

  captcha-welcome-title: "<gold>🛡 Anti-bot verification</gold>"
  captcha-renewal-title: "<gold>🛡 Verification required</gold>"
  # Body shown to brand-new players. The <url> placeholder renders as a clickable link
  # that copies the URL to the player's clipboard. The dialog auto-closes the moment
  # Cloudflare confirms the captcha, and registration appears immediately afterwards —
  # the player does NOT need to come back into Minecraft and click anything.
  captcha-welcome-body: "<gray>Welcome, <yellow><username></yellow>!\n\nThis is your <yellow>first time</yellow> joining this server. To protect us from bots, please complete a quick <green>one-time anti-bot check</green>.\n\n<white>Click the link below — it will open the verification page in your browser:</white>\n\n  <url>\n\n<gray>As soon as you finish the captcha, you'll <green>automatically continue</green> to registration. No need to come back and click anything.</gray>"
  captcha-renewal-body: "<gray>Hey <yellow><username></yellow>! Your previous verification has expired and we need to confirm you're still a human.\n\n<white>Click the link below — it will open the verification page in your browser:</white>\n\n  <url>\n\n<gray>You'll <green>automatically continue</green> the moment the check succeeds.</gray>"
  captcha-button-disconnect: "<red>Disconnect</red>"
  captcha-issue-error: "<red>Failed to issue a verification link. Please reconnect.</red>"
  captcha-server-busy: "<red>The verification queue is full right now. Please try again in a minute.</red>"
