database:
  # Accepted values: "h2" or "mariadb"
  type: "h2"
  h2:
    file: "players"
    options: "AUTO_SERVER=FALSE;MODE=MySQL"
  mariadb:
    host: "127.0.0.1"
    port: 3306
    database: "authsecurity"
    username: "auth"
    password: "change-me"
    parameters: "useSSL=false&autoReconnect=true&characterEncoding=utf8"
  pool:
    maximum-pool-size: 16
    minimum-idle: 2
    connection-timeout-millis: 5000

security:
  # Per-session wrong-password attempts before the player is kicked from the login dialog.
  max-attempts: 3
  # IP-trusted session TTL for players who explicitly enable fast login with /authsecurity trustip on.
  # Set to 0 to fully disable the feature for everyone.
  session-ttl-minutes: 60
  # Time the player has to complete the login/register dialog before being kicked.
  login-timeout-minutes: 3
  password-min-length: 6
  password-max-length: 72
  # Maximum number of distinct accounts that may be connected concurrently from the same IP.
  accounts-per-ip-limit: 3
  # Maximum number of players that may wait on the login/register dialog at the same time.
  # Set to 0 to disable the limit.
  max-concurrent-auth-sessions: 100

  # Persistent per-IP lockout. Counts wrong-password attempts by source address so an
  # attacker can't lock out a victim's account by failing its password — only their
  # own IP gets banned. Survives reconnects within a server session.
  lockout:
    enabled: false
    max-attempts: 5
    ban-minutes: 15

  # Kick authenticated players who have been idle (no movement/chat/commands) for too long.
  # They'll be asked to log in again on the next connect.
  idle-logout:
    enabled: false
    minutes: 30

  # Optional password complexity requirements (applied to registration and password change).
  password-policy:
    require-letter-and-digit: false

support:
  # Shown to the player when they press "Forgot Password"
  discord-url: "https://discord.gg/your-invite-here"

# Web-CAPTCHA gate (Cloudflare Turnstile) for new and stale players.
# When enabled, the plugin starts an embedded HTTP server that hosts a Turnstile widget.
# Get your keys at https://dash.cloudflare.com → Turnstile.
# enabled, web-port and public-base-url require a full server restart to take effect
# (the embedded HTTP server is created once on startup, like the database pool).
captcha:
  enabled: false
  # Defaults below are Cloudflare's official "always pass" Turnstile test keys —
  # https://developers.cloudflare.com/turnstile/troubleshooting/testing/
  # They make the captcha auto-succeed everywhere, useful for local end-to-end
  # testing after code changes. REPLACE BOTH with real keys before going to
  # production, otherwise your captcha gate is effectively disabled.
  # Public site key — embedded into the HTML page.
  site-key: "1x00000000000000000000AA"
  # Private secret — used server-side to verify the Turnstile response.
  secret-key: "1x0000000000000000000000000000000AA"
  # Interface the embedded HTTP server binds to. Use "127.0.0.1" when you put
  # nginx (or another reverse proxy) in front and want the captcha port to be
  # unreachable from the public internet. Use "0.0.0.0" to listen on every
  # interface (only safe if the port is firewalled to trusted sources).
  web-bind: "0.0.0.0"
  # Port for the embedded HTTP server. Must be open in your firewall.
  web-port: 25590
  # Public URL the player will see in the dialog. Use https:// if you have nginx + TLS in front.
  # Example: "http://your-vps-ip:25590" or "https://captcha.example.com"
  public-base-url: "http://127.0.0.1:25590"
  # How long a single verification link stays usable. Should be ≤ login-timeout-minutes above.
  token-ttl-minutes: 10
  # How long a successful captcha is remembered for that account. After this many days the
  # player will be asked to pass captcha again on next connect. Set 0 to require it every time.
  verification-validity-days: 7
  # If false, captcha_verified_at is updated only after a real captcha pass.
  # If true, every successful login refreshes the captcha validity window.
  refresh-verification-on-login: false
  # If false, captcha token verification does not compare the web request IP with the Minecraft IP.
  verify-client-ip: true
  # Re-prompt the captcha when the player's IP differs from the one used during the
  # last successful verification. Helps against session hijacks / cookie theft scenarios
  # where an attacker reuses an authenticated UUID from a different network. Disable for
  # audiences on mobile / dynamic ISPs where IPs change frequently.
  revalidate-on-ip-change: true
  # Hard cap on how many captcha challenges can be open at the same time. Each waiting
  # session occupies one Paper async config-thread for up to token-ttl-minutes, so this
  # is the main defence against a botnet trying to exhaust your thread pool. Set to 0
  # to disable the limit (not recommended on a public server).
  max-concurrent-challenges: 50

  # Reverse proxy support for nginx/Cloudflare tunnels/etc. Only enable this when the
  # captcha web server is reachable through a proxy you control.
  proxy:
    enabled: false
    trusted-ips:
      - "127.0.0.1"
      - "::1"
    forwarded-for-header: "X-Forwarded-For"

  # Texts rendered into the captcha web page (https://<your-host>/c/<token>).
  # Plain text (NOT MiniMessage). Use YAML block scalar "|-" for multi-line
  # status messages — real newlines become line breaks on the page.
  # To translate the page, just override the strings below.
  web-texts:
    lang: "en"
    title: "PinkyFoxy — Anti-bot Verification"
    brand: "PINKY FOXY"
    tagline: "~ Anti-bot Verification ~"
    heading: "Prove you are not a bot"
    intro: |-
      Complete the check below to enter the server.
      When it succeeds you can close this tab — Minecraft will continue automatically.
    hint: "If the widget doesn't load, make sure JavaScript is enabled and Cloudflare is reachable."
    footer: "© PinkyFoxy · Powered by Cloudflare Turnstile"
    status-verifying: "Verifying..."
    status-verified: |-
      VERIFIED!
      You can close this tab and return to Minecraft.
      The login screen will appear automatically.
    status-failed: |-
      Verification failed.
      Please try again.
    status-network: |-
      Network error.
      Check your connection and try again.
    status-widget-error: |-
      Captcha widget error.
      Please refresh the page.

messages:
  login-title: "<gold>🔐 Login</gold>"
  login-welcome: "<gray>Welcome back, <yellow><username></yellow>! Enter your password.</gray>"
  login-button: "<green>Login</green>"
  forgot-password-button: "<yellow>Forgot password?</yellow>"
  register-title: "<aqua>📝 Register</aqua>"
  register-welcome: "<gray>Hello <yellow><username></yellow>! Create a password.</gray>"
  register-button: "<green>Register</green>"
  cancel-button: "<red>Cancel</red>"
  password-label: "<white>Password</white>"
  password-confirm-label: "<white>Confirm password</white>"
  wrong-password: "<red>Wrong password — <remaining> attempt(s) left.</red>"
  too-many-attempts: "<red>Too many failed attempts.</red>"
  login-cancelled: "<yellow>Login cancelled.</yellow>"
  login-timed-out: "<yellow>Login timed out. Please reconnect.</yellow>"
  internal-error: "<red>Internal server error.</red>"
  password-empty: "<red>Password cannot be empty.</red>"
  password-too-short: "<red>Password must be at least <min> characters.</red>"
  password-too-long: "<red>Password must be at most <max> characters.</red>"
  passwords-mismatch: "<red>Passwords do not match.</red>"
  uuid-missing: "<red>Could not determine your UUID.</red>"
  ip-limit-reached: "<red>Too many accounts connected from your IP address (limit: <limit>).</red>"
  account-locked: "<red>Too many failed attempts. Account locked for <minutes> minute(s).</red>"
  wrong-username-case: "<red>Your registered name is '<correct>'. Please reconnect with the correct spelling.</red>"
  name-already-registered: "<red>The name '<name>' is already registered to a different account. Please contact a server administrator.</red>"
  idle-kick: "<yellow>Kicked for inactivity. Please log in again.</yellow>"
  password-requires-alphanumeric: "<red>Password must contain at least one letter and one digit.</red>"

  forgot-password-title: "<gold>🔑 Recover your account</gold>"
  forgot-password-body: "<gray>Please open a ticket on our Discord server and a staff member will help you recover access to your account.\nOur team will verify your identity before any password is reset.</gray>"
  forgot-password-discord-button: "<blue>Open Discord invite</blue>"
  forgot-password-back-button: "<gray>Back</gray>"

  change-password-title: "<gold>🔑 Change password</gold>"
  change-password-body: "<gray>Enter your current password followed by the new one.</gray>"
  change-password-old-label: "<white>Current password</white>"
  change-password-new-label: "<white>New password</white>"
  change-password-confirm-label: "<white>Confirm new password</white>"
  change-password-button: "<green>Save</green>"
  change-password-success: "<green>Your password has been updated.</green>"
  change-password-wrong-old: "<red>Your current password is incorrect.</red>"

  command-only-players: "<red>Only players can run this command.</red>"
  command-not-authenticated: "<red>You are not logged in.</red>"
  command-player-not-found: "<red>No account registered for '<player>'.</red>"
  command-unregister-success: "<green>Account '<player>' has been removed.</green>"
  command-changepassword-admin-success: "<green>Password for '<player>' has been updated.</green>"
  command-accountinfo-header: "<gold>Account info for <player></gold>"
  command-accountinfo-line: "<gray><key>:</gray> <white><value></white>"
  command-no-permission: "<red>You do not have permission to use this command.</red>"
  command-logout-success: "<green>'<player>' has been logged out.</green>"
  command-logout-not-online: "<yellow>'<player>' is not online. Trusted session cleared.</yellow>"
  command-logout-kick: "<yellow>You have been logged out by an administrator.</yellow>"
  command-trustip-enabled: "<green>Fast login from this IP is now enabled for your account.</green>"
  command-trustip-disabled: "<yellow>Fast login from this IP is now disabled for your account.</yellow>"
  command-trustip-unavailable: "<red>Fast login by IP is disabled by the server administrator.</red>"
  trusted-ip-login-hint: "<gray>You can enable convenient fast login from this IP with <yellow>/authsecurity trustip on</yellow>. Only use it if this IP is not shared with other people.</gray>"
  admin-password-changed-kick: "<yellow>Your password was changed by an administrator. Please reconnect to log in again.</yellow>"
  admin-account-unregistered-kick: "<yellow>Your account was removed by an administrator. Please reconnect.</yellow>"

  command-reload-started: "<gray>Reloading AuthSecurity configuration…</gray>"
  command-reload-success: "<green>AuthSecurity configuration reloaded. Database settings require a server restart.</green>"
  command-reload-failed: "<red>Reload failed — see server log.</red>"

  captcha-welcome-title: "<gold>🛡 Anti-bot verification</gold>"
  captcha-renewal-title: "<gold>🛡 Verification required</gold>"
  # Captcha dialog body. The verification URL is exposed via the "Open captcha" button
  # below — do NOT inline it as <url> in the body, the dialog will compress long links
  # and look ugly. The dialog auto-closes the moment Cloudflare confirms the captcha,
  # and registration / login appears immediately afterwards — the player does NOT need
  # to come back into Minecraft and click anything.
  # Note about regional restrictions: Cloudflare's verification endpoint is unreachable
  # from a few regions due to sanctions; in that case players need a VPN.
  captcha-welcome-body: "<gray>Welcome, <yellow><username></yellow>!\n\nThis is your <yellow>first time</yellow> on this server. To protect us from bots, please complete a quick <green>one-time anti-bot check</green>.\n\n<white>Press <yellow>Open captcha</yellow> below — the verification page will open in your browser. You'll <green>automatically return</green> to registration the moment the check succeeds — no need to click anything in Minecraft.</white>\n\n<gray><italic>Heads up: in some regions Cloudflare's check is blocked due to sanctions. If the page does not load, please use a <yellow>VPN</yellow>. If anything else goes wrong — press <yellow>Discord help</yellow> and our team will sort it out.</italic></gray>"
  captcha-renewal-body: "<gray>Hey <yellow><username></yellow>! Your previous verification has expired (or you're connecting from a new IP), so we need to confirm you're still a human.\n\n<white>Press <yellow>Open captcha</yellow> below — the verification page will open in your browser. You'll <green>automatically continue</green> the moment the check succeeds.</white>\n\n<gray><italic>Heads up: in some regions Cloudflare's check is blocked due to sanctions. If the page does not load, please use a <yellow>VPN</yellow>. If you need help, press <yellow>Discord help</yellow>.</italic></gray>"
  captcha-button-open: "<green>Open captcha</green>"
  captcha-button-discord: "<aqua>Discord help</aqua>"
  captcha-button-disconnect: "<red>Disconnect</red>"
  captcha-issue-error: "<red>Failed to issue a verification link. Please reconnect.</red>"
  captcha-server-busy: "<red>The verification queue is full right now. Please try again in a minute.</red>"
  auth-server-busy: "<red>Too many players are logging in right now. Please try again in a minute.</red>"
