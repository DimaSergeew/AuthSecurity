  captcha-welcome-title: "<gold>🛡 Проверка от ботов</gold>"
  captcha-renewal-title: "<gold>🛡 Требуется проверка</gold>"
  # Captcha dialog body. The verification URL is exposed via the "Open captcha" button
  # below — do NOT inline it as <url> in the body, the dialog will compress long links
  # and look ugly. The dialog auto-closes the moment Cloudflare confirms the captcha,
  # and registration / login appears immediately afterwards — the player does NOT need
  # to come back into Minecraft and click anything.
  # Note about regional restrictions: Cloudflare's verification endpoint is unreachable
  # from a few regions due to sanctions; in that case players need a VPN.
  captcha-welcome-body: "<gray>Привет, <yellow><username></yellow>!\n\nВы впервые заходите на сервер. Чтобы защититься от ботов, пройдите короткую <green>одноразовую проверку</green>.\n\n<white>Нажмите <yellow>Открыть captcha</yellow> ниже — страница проверки откроется в браузере. После успешной проверки регистрация появится автоматически, нажимать что-то в Minecraft не нужно.</white>\n\n<gray><italic>Если страница не открывается, возможно Cloudflare недоступен в вашем регионе. Попробуйте VPN или нажмите <yellow>Помощь Discord</yellow>.</italic></gray>"
  captcha-renewal-body: "<gray>Привет, <yellow><username></yellow>!\n\nСрок прошлой проверки истек или вы заходите с нового IP, поэтому нужно еще раз подтвердить, что вы не бот.\n\n<white>Нажмите <yellow>Открыть captcha</yellow> ниже — страница проверки откроется в браузере. После успешной проверки вход продолжится автоматически.</white>\n\n<gray><italic>Если страница не открывается, попробуйте VPN или нажмите <yellow>Помощь Discord</yellow>.</italic></gray>"
  captcha-button-open: "<green>Открыть captcha</green>"
  captcha-button-discord: "<aqua>Помощь Discord</aqua>"
  captcha-button-disconnect: "<red>Отключиться</red>"
  captcha-issue-error: "<red>Не удалось создать ссылку проверки. Перезайдите на сервер.</red>"
  captcha-server-busy: "<red>Очередь проверки сейчас заполнена. Попробуйте через минуту.</red>"
  auth-server-busy: "<red>Слишком много игроков сейчас проходит вход. Попробуйте через минуту.</red>"
