# Overrides password4j's bundled defaults so startup no longer warns about
# global.salt.length and friends. We don't use password4j's global pepper/salt —
# Argon2id parameters are set explicitly in PasswordHasher.

global.salt.length=64
global.pepper=

hash.pbkdf2.algorithm=PBKDF2WithHmacSHA256
hash.pbkdf2.iterations=310000
hash.pbkdf2.length=256

hash.bcrypt.minor=b
hash.bcrypt.rounds=12

hash.scrypt.workfactor=65536
hash.scrypt.resources=8
hash.scrypt.parallelization=1
hash.scrypt.derivedKeyLength=64

hash.argon2.memory=19456
hash.argon2.iterations=2
hash.argon2.parallelism=1
hash.argon2.length=32
hash.argon2.type=ID
hash.argon2.version=19
