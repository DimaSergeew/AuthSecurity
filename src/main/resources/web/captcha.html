<!DOCTYPE html>
<html lang="{{lang}}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" defer></script>
    <style>
        :root {
            --bg-deep: #1a0d1a;
            --bg-mid: #2a1530;
            --pink: #ff5ec4;
            --pink-soft: #ffa8dc;
            --pink-deep: #b3398f;
            --gold: #ffd86b;
            --green: #6bff8e;
            --red: #ff6b8a;
            --text: #f8e6f3;
            --text-dim: #c9a3bf;
            --shadow: rgba(0, 0, 0, 0.55);
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'VT323', 'Courier New', monospace;
            color: var(--text);
            background:
                radial-gradient(ellipse at top, rgba(255, 94, 196, 0.18) 0%, transparent 55%),
                radial-gradient(ellipse at bottom, rgba(255, 168, 220, 0.12) 0%, transparent 55%),
                linear-gradient(160deg, var(--bg-deep) 0%, var(--bg-mid) 100%);
            background-attachment: fixed;
            image-rendering: pixelated;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                repeating-linear-gradient(0deg,
                    rgba(255, 255, 255, 0.02) 0px,
                    rgba(255, 255, 255, 0.02) 1px,
                    transparent 1px,
                    transparent 3px);
            z-index: 0;
        }

        .wrap {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            position: relative;
            width: 100%;
            max-width: 480px;
            padding: 36px 32px 32px;
            background: linear-gradient(180deg, #3a1a3f 0%, #2a1530 100%);
            border: 4px solid var(--pink);
            box-shadow:
                0 0 0 4px var(--bg-deep),
                0 0 0 8px var(--pink-deep),
                0 12px 0 0 rgba(0, 0, 0, 0.5),
                0 16px 32px var(--shadow);
            text-align: center;
        }

        .card::before, .card::after {
            content: "";
            position: absolute;
            width: 12px;
            height: 12px;
            background: var(--gold);
            box-shadow: 0 0 0 2px var(--bg-deep);
        }
        .card::before { top: -6px; left: -6px; }
        .card::after  { top: -6px; right: -6px; }

        .corner {
            position: absolute;
            width: 12px;
            height: 12px;
            background: var(--gold);
            box-shadow: 0 0 0 2px var(--bg-deep);
        }
        .corner.bl { bottom: -6px; left: -6px; }
        .corner.br { bottom: -6px; right: -6px; }

        .fox {
            font-size: 56px;
            line-height: 1;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 0 rgba(0, 0, 0, 0.5));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .brand {
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 22px;
            color: var(--pink);
            text-shadow:
                3px 3px 0 var(--pink-deep),
                0 0 16px rgba(255, 94, 196, 0.5);
            letter-spacing: 2px;
            margin: 0 0 6px;
        }

        .tagline {
            font-size: 22px;
            color: var(--pink-soft);
            margin: 0 0 22px;
            letter-spacing: 1px;
        }

        .divider {
            height: 4px;
            background:
                linear-gradient(90deg,
                    transparent 0%,
                    var(--pink-deep) 20%,
                    var(--pink) 50%,
                    var(--pink-deep) 80%,
                    transparent 100%);
            margin: 0 -12px 22px;
            image-rendering: pixelated;
        }

        h1 {
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 14px;
            color: var(--gold);
            letter-spacing: 1px;
            margin: 0 0 14px;
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.6);
        }

        p {
            font-size: 22px;
            color: var(--text-dim);
            line-height: 1.4;
            margin: 0 0 18px;
        }

        .cf-turnstile {
            display: flex;
            justify-content: center;
            margin: 18px 0 8px;
            min-height: 70px;
        }

        #status {
            margin-top: 18px;
            min-height: 60px;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 11px;
            line-height: 1.7;
            letter-spacing: 1px;
            white-space: pre-line;
        }
        #status.ok   { color: var(--green); text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.6); }
        #status.err  { color: var(--red);   text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.6); }
        #status.busy { color: var(--gold); }

        #success-block {
            display: none;
            text-align: center;
            padding-top: 8px;
        }
        .check-anim {
            display: block;
            font-size: 72px;
            color: var(--green);
            text-shadow: 0 0 32px rgba(107, 255, 142, 0.6);
            animation: pop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) both;
            margin-bottom: 14px;
        }
        @keyframes pop {
            0%   { transform: scale(0); opacity: 0; }
            70%  { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        .success-heading {
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 12px;
            color: var(--green);
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.6);
            line-height: 1.8;
            margin-bottom: 16px;
            white-space: pre-line;
        }
        .countdown-text {
            font-size: 20px;
            color: var(--text-dim);
        }

        .hint {
            font-size: 18px;
            color: var(--text-dim);
            margin-top: 22px;
            opacity: 0.75;
        }

        .footer {
            margin-top: 18px;
            padding-top: 14px;
            border-top: 2px dashed rgba(255, 168, 220, 0.25);
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 9px;
            color: var(--pink-soft);
            letter-spacing: 1px;
        }

        @media (max-width: 540px) {
            .card { padding: 28px 20px 24px; }
            .brand { font-size: 16px; }
            h1 { font-size: 11px; }
            #status { font-size: 9px; }
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <span class="corner bl"></span>
        <span class="corner br"></span>

        <div class="fox">🦊</div>
        <h2 class="brand">{{brand}}</h2>
        <div class="tagline">{{tagline}}</div>
        <div class="divider"></div>

        <h1>{{heading}}</h1>
        <p>{{introHtml}}</p>

        <div class="cf-turnstile" data-sitekey="{{siteKey}}" data-callback="onOk" data-error-callback="onErr" data-theme="dark"></div>

        <div id="status">&nbsp;</div>

        <div id="success-block">
            <span class="check-anim">✓</span>
            <div class="success-heading" id="success-msg"></div>
            <div class="countdown-text" id="countdown-el"></div>
        </div>

        <p class="hint">{{hint}}</p>
        <div class="footer">{{footer}}</div>
    </div>
</div>
<script>
    var TOKEN = "{{token}}";
    var I18N = {{i18nJson}};
    var statusEl = document.getElementById("status");

    function setStatus(text, cls) {
        statusEl.textContent = text;
        statusEl.className = cls || "";
    }

    function onOk(cfToken) {
        setStatus(I18N.verifying, "busy");
        fetch("/verify", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token: TOKEN, cfResponse: cfToken })
        }).then(function (r) {
            if (r.ok) {
                showSuccess();
            } else {
                setStatus(I18N.failed, "err");
            }
        }).catch(function () {
            setStatus(I18N.network, "err");
        });
    }

    function showSuccess() {
        var widget = document.querySelector(".cf-turnstile");
        if (widget) widget.style.display = "none";
        setStatus(" ", "");
        document.getElementById("success-msg").textContent = I18N.verified;
        document.getElementById("success-block").style.display = "block";
        startCountdown(I18N.autoCloseSecs || 5);
    }

    function startCountdown(secs) {
        var el = document.getElementById("countdown-el");
        var remaining = secs;
        function tick() {
            if (remaining <= 0) {
                el.textContent = "";
                window.close();
                setTimeout(function () {
                    if (!window.closed) {
                        el.textContent = I18N.closeManually;
                    }
                }, 300);
                return;
            }
            el.textContent = I18N.closingIn.replace("{secs}", remaining);
            remaining--;
            setTimeout(tick, 1000);
        }
        tick();
    }

    function onErr() {
        setStatus(I18N.widgetError, "err");
    }
</script>
</body>
</html>
